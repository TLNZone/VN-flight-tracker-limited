name: Flight Price Checker

on:
  schedule:
    - cron: '0 6 * * *'     # 6 AM UTC (morning)
    - cron: '0 12 * * *'    # 12 PM UTC (midday)
    - cron: '0 18 * * *'    # 6 PM UTC (evening)
    - cron: '0 22 * * *'    # 10 PM UTC (night)
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci --prefix backend
      
      - name: Run price check
        env:
          IGNAV_API_KEY: ${{ secrets.IGNAV_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ROUTES: 'SZG:DAD,MUC:DAD,VIE:DAD,FRA:DAD'
          OUTBOUND_DATE: '2026-12-19'
          RETURN_DATE: '2027-01-07'
          MAX_STOPS_DEFAULT: 1
          MAX_STOPS_SALZBURG: 2
          MAX_PRICE: 1450
          MAX_DURATION: 22
          SAFETY_MARGIN: 980
        run: node backend/price-checker.js
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-check-log-${{ github.run_id }}
          path: backend/logs/
          retention-days: 7
