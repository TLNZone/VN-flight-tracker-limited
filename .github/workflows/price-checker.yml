name: Flight Price Checker

on:
  schedule:
    - cron: '0 6,12,18,22 * * *'  # 6 AM, 12 PM, 6 PM, 10 PM UTC
  workflow_dispatch:

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      IGNAV_API_KEY: ${{ secrets.IGNAV_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      SAFETY_MARGIN: 980
      ROUTES: 'FRA:SGN,MUC:SGN,SGN:DAD'
      OUTBOUND_DATE: '2026-12-20'
      RETURN_DATE: '2027-01-06,2027-01-07,2027-01-08'
      MAX_PRICE: 6000
      MAX_DURATION: 26
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd backend
          npm install
      
      - name: Run price-checker
        run: |
          cd backend
          node price-checker.js
